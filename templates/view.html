<h2>Students List</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Action</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>
        <a href="/update/{{ student[0] }}">Edit</a> |
        <a href="/delete/{{ student[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

<a href="/">Go Home</a>
